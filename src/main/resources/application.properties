spring.datasource.url=jdbc:mysql://ubicom.mysql.database.azure.com:3306/ubicom?serverTimezone=Asia/Seoul&useSSL=true&allowPublicKeyRetrieval=true

spring.datasource.username=ubicom
spring.datasource.password=ubicom

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.show_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.web.resources.static-locations=classpath:/static/

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true