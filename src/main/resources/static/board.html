<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판 - UbiCOM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-blue-600 text-white shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <button onclick="location.href='/'" class="text-2xl font-bold hover:text-blue-100 transition-colors">UbiCOM</button>
                <nav class="hidden md:flex items-center gap-6">
                    <a href="notice.html" class="hover:text-blue-100 transition-colors">공지사항</a>
                    <a href="calendar.html" class="hover:text-blue-100 transition-colors">학사일정</a>
                    <a href="board.html" class="hover:text-blue-100 transition-colors font-semibold">게시판</a>
                    <a href="poll.html" class="hover:text-blue-100 transition-colors">투표</a>
                    <div id="nav-buttons"></div>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 py-8 px-4 bg-gray-50">
        <div class="container mx-auto max-w-5xl">
            <div class="mb-8">
                <h1 class="text-4xl font-bold mb-2">게시판</h1>
                <p class="text-gray-600">UbiCOM 회원들과 소통하고 정보를 공유하세요</p>
            </div>

            <!-- Search and Create -->
            <div class="flex flex-col sm:flex-row gap-4 mb-6">
                <div class="relative flex-1">
                    <input 
                        type="text" 
                        id="search-input" 
                        placeholder="게시글 검색..."
                        class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    >
                    <svg class="absolute left-3 top-3 h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                
                <button id="create-post-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md font-medium whitespace-nowrap transition-colors">
                    + 글 쓰기
                </button>
            </div>

            <!-- Posts List -->
            <div id="posts-list" class="space-y-4">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>
    </main>

    <!-- Create Post Modal -->
    <div id="create-modal" class="modal-overlay hidden">
        <div class="modal-content max-w-2xl">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold">새 게시글 작성</h2>
                <button id="close-modal" class="text-gray-500 hover:text-gray-700">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <div id="modal-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-md">
                <p class="text-sm text-red-800"></p>
            </div>

            <form id="create-post-form" class="space-y-4">
                <div>
                    <label for="post-title" class="block text-sm font-medium text-gray-700 mb-2">제목</label>
                    <input 
                        type="text" 
                        id="post-title" 
                        placeholder="게시글 제목을 입력하세요"
                        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                        required
                    >
                </div>
                
                <div>
                    <label for="post-content" class="block text-sm font-medium text-gray-700 mb-2">내용</label>
                    <textarea 
                        id="post-content" 
                        rows="8"
                        placeholder="게시글 내용을 입력하세요"
                        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                        required
                    ></textarea>
                </div>

                <div class="flex items-center space-x-2">
                    <input 
                        type="checkbox" 
                        id="anonymous-checkbox"
                        class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
                    >
                    <label for="anonymous-checkbox" class="text-sm cursor-pointer">익명으로 작성하기</label>
                </div>

                <div class="flex justify-end gap-2">
                    <button type="button" id="cancel-btn" class="px-6 py-2 border border-gray-300 rounded-md hover:bg-gray-50 transition-colors">취소</button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md transition-colors">작성하기</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-8 mt-auto">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <p class="text-xl font-bold">UbiCOM</p>
                    <p class="text-sm text-gray-400 mt-1">Ubiquitous Computing Club</p>
                </div>
                <div class="text-sm text-gray-400 text-center md:text-right">
                    <p>&copy; 2026 UbiCOM. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/board.js"></script>
</body>
</html>
