<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - UbiCOM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen flex flex-col">
<header class="bg-blue-600 text-white shadow-lg w-full">
    <!-- container 대신 w-full과 px-6(좌우 여백) 사용 -->
    <div class="w-full px-6 flex items-center justify-between h-16">
            <button onclick="location.href='/'" class="text-2xl font-bold hover:text-blue-100 transition-colors">
                UbiCOM
            </button>
            <nav class="hidden md:flex items-center gap-6">

                <button onclick="location.href='/login'" class="bg-white text-blue-600 hover:bg-blue-50 px-4 py-2 rounded-md text-sm font-medium transition-colors cursor-pointer">
                    로그인
                </button>
            </nav>
            <!-- Mobile Menu Button -->
            <button class="md:hidden p-2" id="mobile-menu-btn">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
        <!-- Mobile Navigation -->
        <nav id="mobile-menu" class="hidden md:hidden py-4 border-t border-blue-500">
            <div class="flex flex-col gap-3">

                <button onclick="location.href='/login'" class="bg-white text-blue-600 hover:bg-blue-50 px-4 py-2 rounded-md text-sm font-medium transition-colors cursor-pointer">
                    로그인
                </button>
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>
        </nav>
    </div>
</header>

<main class="flex-1 bg-gray-50 py-12 px-4">
    <div class="max-w-md mx-auto">
        <div class="bg-white rounded-lg shadow-lg p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900 mb-2">회원가입</h1>
                <p class="text-gray-600">UbiCOM의 새로운 회원이 되어보세요</p>
            </div>

            <div id="error-message" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-md">
                <p class="text-sm text-red-800"></p>
            </div>

            <form id="register-form" action="/member" method="POST" class="space-y-6">
                <div class="space-y-2">
                    <label for="name" class="block text-sm font-medium text-gray-700">이름</label>
                    <input
                            type="text"
                            id="name"
                            name="name"
                            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            required
                    >
                </div>

                <div class="space-y-2">
                    <label for="studentId" class="block text-sm font-medium text-gray-700">학번</label>
                    <input
                            type="text"
                            name="studentId"
                            id="studentId"
                            maxlength="8"
                            placeholder="8자리 학번"
                            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            required
                    >
                </div>

                <div class="space-y-2">
                    <label for="department" class="block text-sm font-medium text-gray-700">학과</label>
                    <select
                            id="department"
                            name="major"
                            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            required
                    >
                        <option value="">선택해주세요</option>
                        <option value="정보통신">정보통신</option>
                        <option value="정보보안">정보보안</option>
                        <option value="전자공학">전자공학</option>
                        <option value="컴퓨터공학">컴퓨터공학</option>
                        <option value="인공지능">인공지능</option>
                        <option value="모빌리티">모빌리티</option>
                    </select>
                </div>

                <!-- 전화번호 3분할 입력 영역 -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">
                        연락처 <span class="text-red-500">*</span>
                    </label>
                    <div class="flex items-center gap-2 w-full" id="applyPhoneWrap">
                        <input data-phone type="text" id="phone1" inputmode="numeric" maxlength="3" aria-label="연락처 식별번호" class="w-full px-2 py-2 border border-gray-300 rounded-md text-center focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required />
                        <span class="phone-sep text-gray-400 font-medium">-</span>
                        <input data-phone type="text" id="phone2" inputmode="numeric" maxlength="4" aria-label="연락처 중간자리" class="w-full px-2 py-2 border border-gray-300 rounded-md text-center focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required />
                        <span class="phone-sep text-gray-400 font-medium">-</span>
                        <input data-phone type="text" id="phone3" inputmode="numeric" maxlength="4" aria-label="연락처 뒷자리" class="w-full px-2 py-2 border border-gray-300 rounded-md text-center focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required />
                    </div>

                    <!-- 백엔드로 전송할 합쳐진 전화번호가 저장될 hidden input -->
                    <input type="hidden" id="phone" name="phone">
                </div>


                <div class="space-y-2">
                    <label for="email" class="block text-sm font-medium text-gray-700">이메일</label>
                    <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="example@gmail.com"
                            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            required
                    >
                </div>

                <div class="space-y-2">
                    <label for="password" class="block text-sm font-medium text-gray-700">비밀번호</label>
                    <input
                            type="password"
                            id="password"
                            name="password"
                            maxlength="16"
                            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            required
                    >
                    <label for="password" class="block text-sm font-small text-gray-700">비밀번호는 6자 이상 입력해주시길 바랍니다.</label>
                    <div class="mt-2">
                        <div class="w-full h-2 bg-gray-200 rounded">
                            <div id="password-strength-bar" class="h-2 rounded transition-all duration-300" style="width: 0%;"></div>
                        </div>

                        <p id="password-strength-text" class="mt-1 text-sm text-gray-500">
                            비밀번호 보안 수준
                        </p>
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700">비밀번호 확인</label>
                    <input
                            type="password"
                            id="confirmPassword"
                            name="confirmPassword"
                            maxlength="16"
                            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            required
                    >
                </div>

                <button
                        type="submit"
                        class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition-colors font-medium"
                >
                    가입하기
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">
                    이미 계정이 있으신가요?
                    <a onclick="location.href='/login'" class="text-blue-600 hover:text-blue-700 font-medium">로그인</a>
                </p>
            </div>
        </div>
    </div>
</main>

<footer class="bg-gray-800 text-white py-8">
    <div class="container mx-auto px-4">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <p class="text-xl font-bold">UbiCOM</p>
                <p class="text-sm text-gray-400 mt-1">Ubiquitous Computing Club</p>
            </div>
            <div class="text-sm text-gray-400 text-center md:text-right">
                <p>&copy; 2026 UbiCOM. All rights reserved.</p>
            </div>
        </div>
    </div>
</footer>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script src="js/register.js"></script>
</body>
</html>
