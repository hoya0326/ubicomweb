<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학사일정 - UbiCOM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f9fafb;color:#111827}

        /* 캘린더 그리드 스타일 추가 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 1px;
            background-color: #e5e7eb;
        }
        .calendar-grid > div {
            background-color: #fff;
            padding: 0.75rem 0.5rem;
        }

        /* SIDEBAR & LAYOUT MATCHING */
        .sidebar{display:flex;flex-direction:column;gap:14px;height:100%}
        .side-card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;height:100%;display:flex;flex-direction:column}
        .side-card-hd{padding:14px 16px 10px;border-bottom:1px solid #f3f4f6;font-size:14px;font-weight:700}
        .legend-content{flex:1;display:flex;flex-direction:column}
        .legend-row{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid #f9fafb;font-size:13px}
        .legend-row:last-child{border-bottom:none}
        .leg-dot{width:10px;height:10px;border-radius:9999px;flex-shrink:0}
        .leg-blue{background:#3b82f6}
        .leg-green{background:#22c55e}
    </style>
</head>
<body class="min-h-screen flex flex-col">
<!-- Header -->
<header class="bg-blue-600 text-white shadow-lg">
    <div class="container mx-auto px-4">
        <div class="flex items-center justify-between h-16">
            <button onclick="location.href='/'" class="text-2xl font-bold hover:text-blue-100 transition-colors">UbiCOM</button>
            <nav class="hidden md:flex items-center gap-6">
                <a onclick="location.href='/notice'" class="hover:text-blue-100 transition-colors">공지사항</a>
                <a onclick="location.href='/calendar'" class="hover:text-blue-100 transition-colors font-semibold">학사일정</a>
                <a onclick="location.href='/board'" class="hover:text-blue-100 transition-colors">게시판</a>
                <a onclick="location.href='/vote'" class="hover:text-blue-100 transition-colors">투표</a>
                <div id="nav-buttons"></div>
            </nav>
            <!-- Mobile Menu Button -->
            <button class="md:hidden p-2" id="mobile-menu-btn">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
        <!-- Mobile Navigation -->
        <nav id="mobile-menu" class="hidden md:hidden py-4 border-t border-blue-500">
            <div class="flex flex-col gap-3">
                <a onclick="location.href='/notice'" class="py-2 hover:text-blue-100 transition-colors">공지사항</a>
                <a onclick="location.href='/calendar'" class="py-2 hover:text-blue-100 transition-colors">학사일정</a>
                <a onclick="location.href='/board'" class="py-2 hover:text-blue-100 transition-colors">게시판</a>
                <a onclick="location.href='/vote'" class="py-2 hover:text-blue-100 transition-colors">투표</a>
                <div id="mobile-nav-buttons" class="flex flex-col gap-2 pt-2 border-t border-blue-500">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>
        </nav>
    </div>
</header>

<!-- Main Content -->
<main class="flex-1 py-8 px-4 bg-gray-50">
    <div class="container mx-auto max-w-6xl">
        <div class="mb-8 flex items-center justify-between">
            <div>
                <h1 class="text-4xl font-bold mb-2">학사일정</h1>
                <p class="text-gray-600">UbiCOM의 학사 및 행사 일정을 확인하세요</p>
            </div>

            <!-- Add Event Button (Admin only) -->
            <div id="admin-controls" class="hidden">
                <button id="add-event-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md font-medium transition-colors">
                    + 일정 추가
                </button>
            </div>
        </div>

        <!-- 캘린더와 사이드바를 나란히 배치하는 그리드 컨테이너 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 items-stretch mb-6">
            <!-- 캘린더 영역 (4칸 중 3칸 차지) -->
            <div class="md:col-span-3 bg-white rounded-lg shadow p-6 flex flex-col justify-between">
                <div>
                    <!-- Calendar Navigation -->
                    <div class="flex items-center justify-between mb-6">
                        <button id="prev-month" class="p-2 hover:bg-gray-100 rounded-md transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                            </svg>
                        </button>

                        <h2 id="current-month" class="text-2xl font-bold"></h2>

                        <button id="next-month" class="p-2 hover:bg-gray-100 rounded-md transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                            </svg>
                        </button>
                    </div>

                    <!-- Calendar Grid -->
                    <div class="calendar-grid text-sm">
                        <div class="bg-gray-100 text-center font-semibold p-2 text-red-500">일</div>
                        <div class="bg-gray-100 text-center font-semibold p-2">월</div>
                        <div class="bg-gray-100 text-center font-semibold p-2">화</div>
                        <div class="bg-gray-100 text-center font-semibold p-2">수</div>
                        <div class="bg-gray-100 text-center font-semibold p-2">목</div>
                        <div class="bg-gray-100 text-center font-semibold p-2">금</div>
                        <div class="bg-gray-100 text-center font-semibold p-2 text-blue-500">토</div>
                    </div>
                    <div id="calendar-days" class="calendar-grid text-sm min-h-[350px]">
                        <!-- Will be populated by JavaScript -->
                    </div>
                </div>
            </div>

            <!-- 사이드바 영역 (4칸 중 1칸 차지하며 캘린더와 높이 동기화) -->
            <div class="sidebar">
                <div class="side-card shadow">
                    <div class="side-card-hd bg-gray-50">일정 유형 분류</div>
                    <div class="legend-content">
                        <div class="legend-row"><div class="leg-dot leg-blue"></div><span class="font-medium">행사</span></div>
                        <div class="legend-row"><div class="leg-dot leg-green"></div><span class="font-medium">동아리</span></div>
                        <div class="p-4 text-xs text-gray-400 mt-auto border-t border-gray-100">
                            * 자세한 일정 내용은 달력의 일자를 클릭하거나 하단 목록에서 확인하세요.
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Events List -->
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-xl font-bold mb-4">이번 달 일정</h2>
            <div id="events-list" class="space-y-3">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>
    </div>
</main>

<!-- Add Event Modal -->
<div id="event-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold">일정 추가</h2>
            <button id="close-event-modal" class="text-gray-500 hover:text-gray-700">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <div id="event-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-md">
            <p class="text-sm text-red-800"></p>
        </div>

        <form id="event-form" class="space-y-4">
            <!-- 생략된 폼 필드들 유지 -->
            <div>
                <label for="event-title" class="block text-sm font-medium text-gray-700 mb-2">일정 제목</label>
                <input type="text" id="event-title" placeholder="일정 제목을 입력하세요" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required>
            </div>
            <div>
                <label for="event-date" class="block text-sm font-medium text-gray-700 mb-2">날짜</label>
                <input type="date" id="event-date" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required>
            </div>
            <div>
                <label for="event-description" class="block text-sm font-medium text-gray-700 mb-2">설명</label>
                <textarea id="event-description" rows="3" placeholder="일정 설명을 입력하세요 (선택사항)" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
            </div>
            <div class="flex justify-end gap-2">
                <button type="button" id="cancel-event-btn" class="px-6 py-2 border border-gray-300 rounded-md hover:bg-gray-50 transition-colors">취소</button>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md transition-colors">추가하기</button>
            </div>
        </form>
    </div>
</div>

<!-- Footer -->
<footer class="bg-gray-800 text-white py-8 mt-auto">
    <div class="container mx-auto px-4">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <p class="text-xl font-bold">UbiCOM</p>
                <p class="text-sm text-gray-400 mt-1">Ubiquitous Computing Club</p>
            </div>
            <div class="text-sm text-gray-400 text-center md:text-right">
                <p>&copy; 2026 UbiCOM. All rights reserved.</p>
            </div>
        </div>
    </div>
</footer>

<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script src="js/calendar.js"></script>
</body>
</html>
