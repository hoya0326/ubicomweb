<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학사일정 - UbiCOM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f9fafb;color:#111827}

        /* 캘린더 그리드 스타일 추가 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 1px;
            background-color: #e5e7eb;
        }
        .calendar-grid > div {
            background-color: #fff;
            padding: 0.75rem 0.5rem;
        }

        /* SIDEBAR & LAYOUT MATCHING */
        .sidebar{display:flex;flex-direction:column;gap:14px;height:100%}
        .side-card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;height:100%;display:flex;flex-direction:column}
        .side-card-hd{padding:14px 16px 10px;border-bottom:1px solid #f3f4f6;font-size:14px;font-weight:700}
        .legend-content{flex:1;display:flex;flex-direction:column}
        .legend-row{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid #f9fafb;font-size:13px}
        .legend-row:last-child{border-bottom:none}
        .leg-dot{width:10px;height:10px;border-radius:9999px;flex-shrink:0}
        .leg-blue{background:#3b82f6}
        .leg-green{background:#22c55e}
    </style>
</head>
<body class="min-h-screen flex flex-col">
<!-- Header -->
<header class="bg-blue-600 text-white shadow-lg">
    <div class="container mx-auto px-4">
        <div class="flex items-center justify-between h-16">
            <button onclick="location.href='/'" class="text-2xl font-bold hover:text-blue-100 transition-colors">UbiCOM</button>
            <nav class="hidden md:flex items-center gap-6">
                <a onclick="location.href='/notice'" class="hover:text-blue-100 transition-colors">공지사항</a>
                <a onclick="location.href='/calendar'" class="hover:text-blue-100 transition-colors font-semibold">학사일정</a>
                <a onclick="location.href='/board'" class="hover:text-blue-100 transition-colors">게시판</a>
                <a onclick="location.href='/vote'" class="hover:text-blue-100 transition-colors">투표</a>
                <div id="nav-buttons"></div>
            </nav>
            <!-- Mobile Menu Button -->
            <button class="md:hidden p-2" id="mobile-menu-btn">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
        <!-- Mobile Navigation -->
        <nav id="mobile-menu" class="hidden md:hidden py-4 border-t border-blue-500">
            <div class="flex flex-col gap-3">
                <a onclick="location.href='/notice'" class="py-2 hover:text-blue-100 transition-colors">공지사항</a>
                <a onclick="location.href='/calendar'" class="py-2 hover:text-blue-100 transition-colors">학사일정</a>
                <a onclick="location.href='/board'" class="py-2 hover:text-blue-100 transition-colors">게시판</a>
                <a onclick="location.href='/vote'" class="py-2 hover:text-blue-100 transition-colors">투표</a>
                <div id="mobile-nav-buttons" class="flex flex-col gap-2 pt-2 border-t border-blue-500">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>
        </nav>
    </div>
</header>

<!-- Main Content -->
<main class="flex-1 py-8 px-4 bg-gray-50">
    <div class="container mx-auto max-w-6xl">
        <div class="mb-8 flex items-center justify-between">
            <div>
                <h1 class="text-4xl font-bold mb-2">학사일정</h1>
                <p class="text-gray-600">UbiCOM의 학사 및 행사 일정을 확인하세요</p>
            </div>

            <!-- Add Event Button (Admin only) -->
            <div id="admin-controls" class="hidden flex gap-2">
                <!-- 새로 추가된 버튼 -->
                <button id="btn-toggle-all" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-md font-medium transition-colors">
                    모든 일정 보기
                </button>
                <!-- 기존 일정 추가 버튼 -->
                <button id="add-event-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md font-medium transition-colors">
                    + 일정 추가
                </button>
            </div>
        </div>

        <!-- 캘린더와 사이드바를 나란히 배치하는 그리드 컨테이너 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 items-stretch mb-6">
            <!-- 캘린더 영역 (4칸 중 3칸 차지) -->
            <div class="md:col-span-3 bg-white rounded-lg shadow p-6 flex flex-col justify-between">
                <div>
                    <!-- Calendar Navigation -->
                    <div class="flex items-center justify-between mb-6">
                        <button id="prev-month" class="p-2 hover:bg-gray-100 rounded-md transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                            </svg>
                        </button>

                        <h2 id="current-month" class="text-2xl font-bold"></h2>

                        <button id="next-month" class="p-2 hover:bg-gray-100 rounded-md transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                            </svg>
                        </button>
                    </div>

                    <!-- Calendar Grid -->
                    <div class="calendar-grid text-sm">
                        <div class="bg-gray-100 text-center font-semibold p-2 text-red-500">일</div>
                        <div class="bg-gray-100 text-center font-semibold p-2">월</div>
                        <div class="bg-gray-100 text-center font-semibold p-2">화</div>
                        <div class="bg-gray-100 text-center font-semibold p-2">수</div>
                        <div class="bg-gray-100 text-center font-semibold p-2">목</div>
                        <div class="bg-gray-100 text-center font-semibold p-2">금</div>
                        <div class="bg-gray-100 text-center font-semibold p-2 text-blue-500">토</div>
                    </div>
                    <div id="calendar-days" class="calendar-grid text-sm min-h-[350px]">
                        <!-- Will be populated by JavaScript -->
                    </div>
                </div>
            </div>

            <!-- 사이드바 영역 (4칸 중 1칸 차지하며 캘린더와 높이 동기화) -->
            <div class="sidebar">
                <div class="side-card shadow">
                    <div class="side-card-hd bg-gray-50">일정 유형 분류</div>
                    <div class="legend-content">
                        <div class="legend-row"><div class="leg-dot leg-blue"></div><span class="font-medium">행사</span></div>
                        <div class="legend-row"><div class="leg-dot leg-green"></div><span class="font-medium">스터디</span></div>
                        <div class="p-4 text-xs text-gray-400 mt-auto border-t border-gray-100">
                            * 자세한 일정 내용은 달력의 일자를 클릭하거나 하단 목록에서 확인하세요.
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Events List -->
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-xl font-bold mb-4">이번 달 일정</h2>
            <div id="events-list" class="space-y-3">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>
    </div>
</main>

<!-- Add Event Modal -->
<div id="event-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold">일정 추가</h2>
            <button id="close-event-modal" class="text-gray-500 hover:text-gray-700">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <div id="event-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-md">
            <p class="text-sm text-red-800"></p>
        </div>

        <form id="event-form" class="space-y-4">
            <!-- 생략된 폼 필드들 유지 -->
            <div>
                <label for="event-title" class="block text-sm font-medium text-gray-700 mb-2">일정 제목</label>
                <input type="text" id="event-title" placeholder="일정 제목을 입력하세요" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required>
            </div>
            <div class="space-y-3">
                <div class="flex items-center gap-4">
                    <span class="text-sm font-semibold text-gray-700">일정 기간</span>
                    <div class="flex border border-gray-200 rounded-lg p-0.5 bg-gray-50">
                        <button type="button" id="btn-period-single" onclick="togglePeriodUI(false)" class="cursor-pointer px-4 py-1.5 text-xs font-semibold rounded-md bg-blue-600 text-white shadow-sm transition-all">
                            단일 날짜
                        </button>
                        <button type="button" id="btn-period-range" onclick="togglePeriodUI(true)" class="cursor-pointer px-4 py-1.5 text-xs font-semibold rounded-md text-gray-500 hover:text-gray-700 transition-all">
                            장기 일정
                        </button>
                    </div>
                </div>

                <!-- 일정 기간 모드 상태를 보관할 hidden input ('single' 또는 'range') -->
                <input type="hidden" id="event-period-type" value="single">

                <!-- 날짜 입력 폼 컨테이너 -->
                <div class="grid grid-cols-1 gap-4" id="date-inputs-container">
                    <!-- 단일 날짜용 입력창 (기본값) -->
                    <div id="single-date-wrapper">
                        <input type="date" id="event-start-date" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required>
                    </div>

                    <!-- 장기 일정용 입력창 (처음엔 숨김) -->
                    <div id="range-date-wrapper" class="hidden grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <span class="block text-xs font-medium text-gray-500 mb-1">시작일</span>
                            <input type="date" id="event-range-start" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <span class="block text-xs font-medium text-gray-500 mb-1">종료일</span>
                            <input type="date" id="event-range-end" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 일정 유형 선택 (행사/동아리) -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">일정 분류</label>
                <div class="grid grid-cols-2 gap-3">
                    <!-- 스터디 버튼 -->
                    <button id="btn-cat-study" type="button" class="cursor-pointer flex items-center justify-center gap-2 py-3 rounded-xl border text-sm font-semibold transition-all border-blue-500 bg-blue-50 text-blue-600">
                        <span class="h-2.5 w-2.5 rounded-full bg-blue-500"></span>
                        행사
                    </button>
                    <!-- 활동 버튼 -->
                    <button id="btn-cat-activity" type="button" class="cursor-pointer flex items-center justify-center gap-2 py-3 rounded-xl border text-sm font-semibold transition-all border-gray-200 text-gray-500 hover:bg-gray-50 bg-white">
                        <span class="h-2.5 w-2.5 rounded-full bg-green-500"></span>
                        동아리
                    </button>
                </div>
                <!-- 실제 DB로 전송될 값을 담는 hidden input -->
                <input id="event-category" type="hidden" value="event">
            </div>

            <div class="mt-4">
                <!-- 1. 반복 일정 체크박스 -->
                <label class="flex items-center gap-2 cursor-pointer text-sm font-semibold text-gray-700">
                    <input type="checkbox" id="repeat-checkbox" class="w-4 h-4 text-purple-600 border-gray-300 rounded focus:ring-purple-500">
                    <span class="flex items-center gap-1">
                        🔄 반복 일정
                    </span>
                </label>

                <!-- 2. 반복 주기 버튼 그룹 & 종료일 (기본 숨김 처리) -->
                <div id="recurrence-end-container" class="hidden mt-3 pl-6 space-y-3 border-l-2 border-purple-100">
                    <!-- 기존 select를 대체하여 js에 데이터를 전달할 hidden input -->
                    <input type="hidden" id="event-recurrence" value="none">

                    <!-- 보라색 4개 세그먼트 버튼 -->
                    <div>
                        <span class="block text-xs font-medium text-gray-500 mb-1.5">반복 주기</span>
                        <div class="flex gap-2">

                            <button type="button" id="btn-recur-weekly" class="cursor-pointer px-4 py-2 text-xs font-semibold rounded-md bg-white text-gray-500 border border-gray-200">매주</button>
                            <button type="button" id="btn-recur-monthly" class="cursor-pointer px-4 py-1.5 text-xs font-semibold rounded-md bg-white text-gray-500 border border-gray-200">매월</button>
                            <button type="button" id="btn-recur-yearly" class="cursor-pointer px-4 py-1.5 text-xs font-semibold rounded-md bg-white text-gray-500 border border-gray-200">매년</button>
                        </div>
                    </div>

                    <!-- 반복 종료일 입력창 -->
                    <div>
                        <span class="block text-xs font-medium text-gray-500 mb-1.5">반복 종료일 <span class="text-gray-400 font-normal">(비워두면 무기한)</span></span>
                        <input type="date" id="event-recurrence-end" class="w-full px-4 py-2 text-sm border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500">
                    </div>
                </div>
            </div>

            <div>
                <label for="event-description" class="block text-sm font-medium text-gray-700 mb-2">설명</label>
                <textarea id="event-description" rows="3" placeholder="일정 설명을 입력하세요 (선택사항)" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
            </div>
            <div class="flex justify-end gap-2">
                <button type="button" id="submit-event-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md transition-colors">추가하기</button>
            </div>
        </form>
    </div>
</div>
<div id="view-event-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold" id="view-event-title">일정 상세</h2>
            <button onclick="document.getElementById('view-event-modal').classList.add('hidden')" class="text-gray-500 hover:text-gray-700">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        <div class="space-y-4">
            <div id="view-event-desc" class="text-gray-600"></div>
            <div class="flex justify-end mt-6">
                <button id="view-event-delete-btn" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-md transition-colors">
                    삭제하기
                </button>
            </div>
        </div>
    </div>
</div>
<!-- Footer -->
<footer class="bg-gray-800 text-white py-8 mt-auto">
    <div class="container mx-auto px-4">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <p class="text-xl font-bold">UbiCOM</p>
                <p class="text-sm text-gray-400 mt-1">Ubiquitous Computing Club</p>
            </div>
            <div class="text-sm text-gray-400 text-center md:text-right">
                <p>&copy; 2026 UbiCOM. All rights reserved.</p>
            </div>
        </div>
    </div>
</footer>

<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script src="js/calendar.js"></script>
</body>
</html>
