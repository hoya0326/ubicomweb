<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 - UbiCOM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-blue-600 text-white shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <button onclick="location.href='/'" class="text-2xl font-bold hover:text-blue-100 transition-colors">UbiCOM</button>
                <nav class="hidden md:flex items-center gap-6">
                    <a onclick="location.href='/notice'" class="hover:text-blue-100 transition-colors">공지사항</a>
                    <a onclick="location.href='/calendar'" class="hover:text-blue-100 transition-colors">학사일정</a>
                    <a onclick="location.href='/board'" class="hover:text-blue-100 transition-colors font-semibold">게시판</a>
                    <a onclick="location.href='/vote'" class="hover:text-blue-100 transition-colors">투표</a>
                    <div id="nav-buttons"></div>
                </nav>
                <!-- Mobile Menu Button -->
                <button class="md:hidden p-2" id="mobile-menu-btn">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
            <!-- Mobile Navigation -->
            <nav id="mobile-menu" class="hidden md:hidden py-4 border-t border-blue-500">
                <div class="flex flex-col gap-3">
                    <a onclick="location.href='/notice'" class="py-2 hover:text-blue-100 transition-colors">공지사항</a>
                    <a onclick="location.href='/calendar'" class="py-2 hover:text-blue-100 transition-colors">학사일정</a>
                    <a onclick="location.href='/board'" class="py-2 hover:text-blue-100 transition-colors">게시판</a>
                    <a onclick="location.href='/vote'" class="py-2 hover:text-blue-100 transition-colors">투표</a>
                    <div id="mobile-nav-buttons" class="flex flex-col gap-2 pt-2 border-t border-blue-500">
                        <!-- Will be populated by JavaScript -->
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 py-8 px-4 bg-gray-50">
        <div class="container mx-auto max-w-4xl">
            <button onclick="window.location.href='/board'" class="mb-4 px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-md transition-colors">
                ← 게시판으로 돌아가기
            </button>

            <!-- Post Content -->
            <div id="post-content" class="bg-white rounded-lg shadow mb-6">
                <!-- Will be populated by JavaScript -->
            </div>

            <!-- Comments Section -->
            <div id="comments-section" class="bg-white rounded-lg shadow">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-8 mt-auto">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <p class="text-xl font-bold">UbiCOM</p>
                    <p class="text-sm text-gray-400 mt-1">Ubiquitous Computing Club</p>
                </div>
                <div class="text-sm text-gray-400 text-center md:text-right">
                    <p>&copy; 2026 UbiCOM. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/board-detail.js"></script>
</body>
</html>
