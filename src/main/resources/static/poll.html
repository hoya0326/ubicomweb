<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>투표 – UbiCOM</title>
    <link rel="stylesheet" href="css/styles.css">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; background: #f9fafb; color: #111827; }

        /* PAGE */
        .page { max-width: 850px; margin: 0 auto; padding: 36px 20px 60px; }
        .page-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
        .page-top h1 { font-size: 32px; font-weight: 900; display: flex; align-items: center; gap: 12px; }
        .page-top p { font-size: 14px; color: #6b7280; margin-top: 6px; }
        .icon-bar { width: 34px; height: 34px; flex-shrink: 0; }

        /* BTN */
        .btn-new-poll { background: #2563eb; color: #fff; border: none; border-radius: 9px; padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .btn-new-poll:hover { background: #1d4ed8; }

        /* FILTER TABS */
        .filter-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
        .tab-btn { border-radius: 9999px; padding: 7px 18px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
        .tab-active { background: #2563eb; color: #fff; }
        .tab-inactive { background: #fff; border: 1px solid #e5e7eb; color: #6b7280; }
        .tab-inactive:hover { background: #f9fafb; }

        /* POLL CARD */
        .poll-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; margin-bottom: 16px; overflow: hidden; }
        .poll-ended { opacity: .8; }

        /* POLL HEADER (아이콘 오른쪽 상단 고정을 위해 flex-start 및 flex-row 강제 적용) */
        .poll-header {
            width: 100% !important;
            display: flex !important;
            flex-direction: row !important;
            align-items: flex-start !important;
            justify-content: space-between !important;
            gap: 12px !important;
            padding: 20px 24px !important;
            background: none !important;
            border: none !important;
            cursor: pointer !important;
            text-align: left !important;
        }
        .poll-header:hover { background: #f9fafb !important; }
        .poll-header-left { flex: 1; min-width: 0; }
        .poll-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
        .poll-title { font-size: 16px; font-weight: 700; }
        .poll-meta { font-size: 12px; color: #6b7280; line-height: 1.6; }

        /* POLL HEADER RIGHT & BUTTONS (쓰레기통과 화살표를 우측 상단에 나란히 고정) */
        .poll-header-right {
            display: flex !important;
            flex-direction: row !important;
            align-items: center !important;
            align-self: flex-start !important;
            gap: 8px !important;
            flex-shrink: 0 !important;
            margin-top: -2px !important;
        }
        .chevron {
            width: 20px !important;
            height: 20px !important;
            color: #9ca3af !important;
            transition: transform .2s ease !important;
            flex-shrink: 0 !important;
        }
        .chevron-open { transform: rotate(180deg) !important; }

        /* BADGE */
        .badge { display: inline-block; border-radius: 9999px; font-size: 11px; font-weight: 700; padding: 2px 9px; }
        .badge-blue { background: #dbeafe; color: #1d4ed8; }
        .badge-green { background: #dcfce7; color: #15803d; }
        .badge-gray { background: #f3f4f6; color: #6b7280; }

        /* DELETE BUTTON */
        .btn-trash {
            background: none !important;
            border: none !important;
            cursor: pointer !important;
            color: #ef4444 !important;
            padding: 4px !important;
            border-radius: 8px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            transition: all .15s ease !important;
        }
        .btn-trash:hover { color: #dc2626 !important; background: #fef2f2 !important; }
        .btn-trash svg { width: 20px !important; height: 20px !important; }
        .delete-confirm { padding: 8px 20px 12px; display: flex; align-items: center; gap: 10px; }
        .del-confirm-text { font-size: 13px; font-weight: 600; color: #dc2626; }
        .btn-del-ok { background: #dc2626; color: #fff; border: none; border-radius: 7px; padding: 5px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-del-cancel { background: #fff; border: 1px solid #e5e7eb; border-radius: 7px; padding: 5px 12px; font-size: 13px; cursor: pointer; }

        /* BODY */
        .poll-body { border-top: 1px solid #f3f4f6; padding: 16px 20px 20px; }
        .poll-question { font-size: 15px; font-weight: 600; color: #111827; margin-bottom: 16px; }

        /* VOTE OPTIONS */
        .opts-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
        .opt-label { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border: 1px solid #e5e7eb; border-radius: 10px; cursor: pointer; transition: all .15s; }
        .opt-label:hover { background: #f9fafb; }
        .opt-selected { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
        .opt-input { width: 16px; height: 16px; flex-shrink: 0; accent-color: #2563eb; }
        .opt-text { font-size: 14px; }
        .vote-actions { display: flex; align-items: center; gap: 12px; }
        .btn-vote { background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 8px 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-vote:hover { background: #1d4ed8; }
        .btn-see-result { background: none; border: none; font-size: 13px; color: #6b7280; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
        .btn-go-vote { background: none; border: none; font-size: 13px; color: #2563eb; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; margin-top: 8px; }
        .vote-hint { font-size: 13px; color: #9ca3af; padding: 8px 0; }
        .vote-error { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 8px 12px; font-size: 13px; color: #b91c1c; margin-bottom: 10px; }

        /* RESULT */
        .result-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 8px; }
        .result-item { display: flex; flex-direction: column; gap: 4px; }
        .result-label { display: flex; justify-content: space-between; font-size: 13px; }
        .result-mine { color: #2563eb; font-weight: 600; }
        .result-count { color: #6b7280; }
        .bar-bg { width: 100%; background: #f3f4f6; border-radius: 9999px; height: 10px; overflow: hidden; }
        .bar-fill { height: 10px; border-radius: 9999px; transition: width .4s ease; }
        .bar-blue { background: #3b82f6; }
        .bar-gray { background: #9ca3af; }
        .voter-names { font-size: 11px; color: #9ca3af; }
        .text-red { color: #ef4444; }
        .text-orange { color: #f97316; }

        /* EMPTY */
        .empty-state { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; padding: 60px 20px; text-align: center; color: #9ca3af; font-size: 14px; }

        /* ── CREATE MODAL ── */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: flex-start; justify-content: center; z-index: 50; padding: 40px 16px; overflow-y: auto; }
        .modal { background: #fff; border-radius: 18px; width: 100%; max-width: 520px; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
        .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 22px 24px 16px; border-bottom: 1px solid #f3f4f6; }
        .modal-header h2 { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .modal-close { background: none; border: none; cursor: pointer; font-size: 22px; color: #9ca3af; line-height: 1; }
        .modal-close:hover { color: #374151; }
        .modal-body { padding: 22px 24px 28px; display: flex; flex-direction: column; gap: 18px; }
        .fg label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .req { color: #ef4444; }
        .form-input { width: 100%; padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; }
        .form-input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px #dbeafe; }
        .form-opt-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .form-opt-row .form-input { flex: 1; }
        .btn-remove-opt { background: none; border: none; cursor: pointer; color: #f87171; padding: 4px; flex-shrink: 0; }
        .btn-remove-opt:hover { color: #dc2626; }
        .btn-remove-opt svg { width: 16px; height: 16px; }
        .btn-add-opt { background: none; border: none; cursor: pointer; font-size: 13px; color: #2563eb; display: flex; align-items: center; gap: 4px; padding: 4px 0; }
        .btn-add-opt:hover { text-decoration: underline; }
        .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .check-box { display: flex; align-items: flex-start; gap: 8px; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; cursor: pointer; }
        .check-box input { width: 16px; height: 16px; margin-top: 1px; accent-color: #2563eb; flex-shrink: 0; }
        .check-box-label p:first-child { font-size: 13px; font-weight: 600; }
        .check-box-label p:last-child { font-size: 11px; color: #9ca3af; margin-top: 2px; }
        .deadline-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .deadline-toggle input { width: 16px; height: 16px; accent-color: #f97316; }
        .deadline-fields { display: flex; gap: 8px; margin-top: 8px; padding-left: 24px; }
        .deadline-fields input { flex: 1; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px; outline: none; }
        .deadline-fields input:focus { border-color: #2563eb; }
        .form-error { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #b91c1c; }
        .modal-footer { display: flex; gap: 8px; }
        .btn-submit-poll { flex: 1; background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-submit-poll:hover { background: #1d4ed8; }
        .btn-cancel-poll { padding: 11px 20px; border: 1px solid #e5e7eb; border-radius: 8px; background: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }

        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen">
<!-- Header -->
<header class="bg-blue-600 text-white shadow-lg w-full">
    <!-- container 대신 w-full과 px-6(좌우 여백) 사용 -->
    <div class="w-full px-6 flex items-center justify-between h-16">
            <button onclick="location.href='/'" class="text-2xl font-bold hover:text-blue-100 transition-colors">UbiCOM</button>
            <nav class="hidden md:flex items-center gap-6">
                <a onclick="location.href='/notice'" class="hover:text-blue-100 transition-colors cursor-pointer">공지사항</a>
                <a onclick="location.href='/calendar'" class="hover:text-blue-100 transition-colors cursor-pointer">학사일정</a>
                <a onclick="location.href='/board'" class="hover:text-blue-100 transition-colors cursor-pointer">게시판</a>
                <a onclick="location.href='/vote'" class="hover:text-blue-100 transition-colors font-semibold cursor-pointer">투표</a>
                <div id="nav-buttons"></div>
            </nav>
            <!-- Mobile Menu Button -->
            <button class="md:hidden p-2" id="mobile-menu-btn">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
        <!-- Mobile Navigation -->
        <nav id="mobile-menu" class="hidden md:hidden py-4 border-t border-blue-500">
            <div class="flex flex-col gap-3">
                <a onclick="location.href='/notice'" class="py-2 hover:text-blue-100 transition-colors cursor-pointer">공지사항</a>
                <a onclick="location.href='/calendar'" class="py-2 hover:text-blue-100 transition-colors cursor-pointer">학사일정</a>
                <a onclick="location.href='/board'" class="py-2 hover:text-blue-100 transition-colors cursor-pointer">게시판</a>
                <a onclick="location.href='/vote'" class="py-2 hover:text-blue-100 transition-colors cursor-pointer">투표</a>
                <div id="mobile-nav-buttons" class="flex flex-col gap-2 pt-2 border-t border-blue-500">
                    <!-- JavaScript로 동적 생성 -->
                </div>
            </div>
        </nav>
    </div>
</header>

<!-- PAGE -->
<div class="page">
    <div class="page-top">
        <div>
            <h1>
                <svg class="icon-bar" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                투표
            </h1>
            <p>UbiCOM 동아리 투표에 참여하세요</p>
        </div>
        <div id="createBtnArea"></div>
    </div>

    <!-- FILTER TABS -->
    <div class="filter-tabs" id="filterTabs"></div>

    <!-- POLL LIST -->
    <div id="pollList"></div>
</div>

<!-- CREATE MODAL -->
<div class="modal-overlay hidden" id="createModal">
    <div class="modal">
        <div class="modal-header">
            <h2>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                새 투표 만들기
            </h2>
            <button class="modal-close" onclick="closeCreateForm()">&times;</button>
        </div>
        <div class="modal-body">
            <!-- 제목 -->
            <div class="fg">
                <label>투표 제목 <span class="req">*</span></label>
                <input type="text" id="fTitle" class="form-input" placeholder="예: 다음 세미나 주제 투표" />
            </div>
            <!-- 질문 -->
            <div class="fg">
                <label>질문 <span class="req">*</span></label>
                <input type="text" id="fQuestion" class="form-input" placeholder="예: 어떤 주제를 다루면 좋을까요?" />
            </div>
            <!-- 선택지 -->
            <div class="fg">
                <label>선택지 <span class="req">*</span></label>
                <div id="optionsList"></div>
                <button class="btn-add-opt" onclick="addFormOption()">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                    선택지 추가
                </button>
            </div>
            <!-- 옵션 체크 -->
            <div class="check-grid">
                <label class="check-box">
                    <input type="checkbox" id="fAnon" />
                    <div class="check-box-label">
                        <p>익명 투표</p>
                        <p>투표자 이름을 숨깁니다</p>
                    </div>
                </label>
                <label class="check-box">
                    <input type="checkbox" id="fMulti" />
                    <div class="check-box-label">
                        <p>중복 선택</p>
                        <p>여러 항목 동시 선택 가능</p>
                    </div>
                </label>
            </div>
            <!-- 마감 시간 -->
            <div>
                <label class="deadline-toggle">
                    <input type="checkbox" id="fDeadlineToggle" onchange="toggleDeadlineFields()" />
                    <span>⏰ 마감 시간 설정</span>
                </label>
                <div class="deadline-fields hidden" id="deadlineFields">
                    <input type="date" id="fDate" />
                    <input type="time" id="fTime" value="23:59" style="max-width:120px;" />
                </div>
            </div>
            <!-- 에러 -->
            <div id="fError" class="form-error hidden"></div>
            <!-- 버튼 -->
            <div class="modal-footer">
                <button class="btn-cancel-poll" onclick="closeCreateForm()">취소</button>
                <button class="btn-submit-poll" onclick="submitCreatePoll()">투표 생성</button>
            </div>
        </div>
    </div>
</div>

<!-- JS 모듈 순서대로 로드 -->
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script src="js/poll.js"></script>

<script>
    // 로그아웃 처리 함수
    function logout() {
        localStorage.removeItem("currentUser");
        location.reload();
    }

    // 네비게이션 로그인/로그아웃 상태 표시 업데이트
    function updateNav() {
        const user = JSON.parse(localStorage.getItem("currentUser") || "null");
        const navButtons = document.getElementById("nav-buttons");
        const mobileNav = document.getElementById("mobile-nav-buttons");

        if (user) {
            const btnHtml = `
                <span class="mr-4 font-semibold text-blue-100 text-sm">${user.name || user.username}님</span>
                <button onclick="logout()" class="text-sm bg-blue-700 hover:bg-blue-800 px-3 py-1.5 rounded transition-colors">로그아웃</button>
            `;
            if (navButtons) navButtons.innerHTML = btnHtml;
            if (mobileNav) mobileNav.innerHTML = btnHtml;
        } else {
            const btnHtml = `
                <button onclick="location.href='/login'" class="text-sm bg-blue-700 hover:bg-blue-800 px-3 py-1.5 rounded transition-colors">로그인</button>
            `;
            if (navButtons) navButtons.innerHTML = btnHtml;
            if (mobileNav) mobileNav.innerHTML = btnHtml;
        }
    }

    // DOM 로드 완료 후 실행
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof seedData === 'function') {
            seedData();
        }

        updateNav();

        const mobileMenuBtn = document.getElementById("mobile-menu-btn");
        const mobileMenu = document.getElementById("mobile-menu");
        if (mobileMenuBtn && mobileMenu) {
            mobileMenuBtn.addEventListener("click", function() {
                mobileMenu.classList.toggle("hidden");
            });
        }
    });
</script>
</body>
</html>
