<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UbiCOM - Ubiquitous Computing Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen flex flex-col bg-gray-50">
<header class="bg-blue-600 text-white shadow-lg">
    <div class="container mx-auto px-4">
        <div class="flex items-center justify-between h-16">
            <button onclick="location.href='/'" class="text-2xl font-bold hover:text-blue-100 transition-colors">
                UbiCOM
            </button>

            <nav class="hidden md:flex items-center gap-6">
                <a href="notice.html" class="hover:text-blue-100 transition-colors">공지사항</a>
                <a href="calendar.html" class="hover:text-blue-100 transition-colors">학사일정</a>
                <a href="board.html" class="hover:text-blue-100 transition-colors">게시판</a>

                <!-- Desktop Navigation -->
                <nav class="hidden md:flex items-center gap-6">
                    <a onclick="location.href='/notice'" class="hover:text-blue-100 transition-colors">공지사항</a>
                    <a onclick="location.href='/calendar'" class="hover:text-blue-100 transition-colors">학사일정</a>
                    <a onclick="location.href='/board'" class="hover:text-blue-100 transition-colors">게시판</a>
                    <a onclick="location.href='/vote'" class="hover:text-blue-100 transition-colors">투표</a>

                    <div id="nav-buttons">
                        <!-- Will be populated by JavaScript -->
                    </div>
                </nav>

                <!-- Mobile Menu Button -->
                <button class="md:hidden p-2" id="mobile-menu-btn">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>

            <!-- Mobile Navigation -->
            <nav id="mobile-menu" class="hidden md:hidden py-4 border-t border-blue-500">
                <div class="flex flex-col gap-3">
                    <a onclick="location.href='/notice'" class="py-2 hover:text-blue-100 transition-colors">공지사항</a>
                    <a onclick="location.href='/calendar'" class="py-2 hover:text-blue-100 transition-colors">학사일정</a>
                    <a onclick="location.href='/board'" class="py-2 hover:text-blue-100 transition-colors">게시판</a>
                    <a onclick="location.href='/vote'" class="py-2 hover:text-blue-100 transition-colors">투표</a>
                    <div id="mobile-nav-buttons" class="flex flex-col gap-2 pt-2 border-t border-blue-500">
                        <!-- Will be populated by JavaScript -->

                    </div>
                </div>
            </nav>

            <button class="md:hidden p-2" id="mobile-menu-btn">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>

        <nav id="mobile-menu" class="hidden md:hidden py-4 border-t border-blue-500">
            <div class="flex flex-col gap-3">
                <a href="notice.html" class="py-2 hover:text-blue-100 transition-colors">공지사항</a>
                <a href="calendar.html" class="py-2 hover:text-blue-100 transition-colors">학사일정</a>
                <a href="board.html" class="py-2 hover:text-blue-100 transition-colors">게시판</a>
                <button onclick="showSurvey()" class="bg-emerald-500 text-white py-2 px-4 rounded font-semibold text-center text-sm">
                    📢 2학기 신규회원 가입 신청
                </button>
                <div id="mobile-nav-buttons" class="flex flex-col gap-2 pt-2 border-t border-blue-500">
                </div>
            </div>
        </nav>
    </div>
</header>

<main class="flex-1" id="main-content">
    <div id="default-home-view" class="py-12">
    </div>

    <div id="survey-form-view" class="hidden max-w-md mx-auto my-12 px-4">
        <div class="bg-white rounded-lg shadow-lg p-8 border border-gray-100">
            <div class="text-center mb-6">
                <span class="text-xs font-bold text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full uppercase tracking-wider">2학기 신규 모집</span>
                <h1 class="text-2xl font-bold text-gray-900 mt-2 mb-1">동아리 가입 설문</h1>
                <p class="text-sm text-gray-500">UbiCOM 동아리 가입을 위한 설문조사입니다.</p>
            </div>

            <form action="/submit" method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">이름</label>
                    <input type="text" name="name" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="홍길동" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">학번</label>
                    <input type="text" name="userid" maxlength="8" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="8자리 학번 입력" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">학과</label>
                    <input type="text" name="major" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="예: 정보통신공학과" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
                    <input type="email" name="email" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="example@gmail.com" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">가장 관심 있는 기술 분야</label>
                    <select name="interest" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required>
                        <option value="">선택해 주세요</option>
                        <option value="web">웹/앱 서비스 개발</option>
                        <option value="iot">IoT 및 임베디드 시스템</option>
                        <option value="ai">인공지능 및 빅데이터</option>
                        <option value="security">네트워크 및 정보보안</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">동아리 가입 동기</label>
                    <textarea name="joinReason" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="간단히 적어주세요" required></textarea>
                </div>

                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="hideSurvey()" class="w-1/3 bg-gray-200 text-gray-800 py-2.5 rounded-md hover:bg-gray-300 transition-colors font-medium text-sm">
                        취소
                    </button>
                    <button type="submit" class="w-2/3 bg-emerald-500 text-white py-2.5 rounded-md hover:bg-emerald-600 transition-colors font-semibold text-sm shadow">
                        신청서 제출하기
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<footer class="bg-gray-800 text-white py-8 mt-auto">
    <div class="container mx-auto px-4">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <p class="text-xl font-bold">UbiCOM</p>
                <p class="text-sm text-gray-400 mt-1">Ubiquitous Computing Club</p>
            </div>
            <div class="text-sm text-gray-400 text-center md:text-right">
                <p>&copy; 2026 UbiCOM. All rights reserved.</p>
            </div>
        </div>
    </div>
</footer>

<script>
    function showSurvey() {
        document.getElementById('default-home-view').classList.add('hidden');
        document.getElementById('survey-form-view').classList.remove('hidden');
    }
    function hideSurvey() {
        document.getElementById('survey-form-view').classList.add('hidden');
        document.getElementById('default-home-view').classList.remove('hidden');
    }
</script>

<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script src="js/home.js"></script>
</body>
</html>
