<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>동아리원 관리 – UbiCOM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f9fafb;color:#111827}

        /* PAGE */
        .page{max-width:960px;margin:0 auto;padding:36px 20px 60px}
        .page-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
        .page-top h1{font-size:24px;font-weight:800;display:flex;align-items:center;gap:10px}
        .page-top p{font-size:14px;color:#6b7280;margin-top:5px}
        .btn-add{background:#2563eb;color:#fff;border:none;border-radius:9px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
        .btn-add:hover{background:#1d4ed8}
        /* STATS */
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
        @media(max-width:640px){.stats{grid-template-columns:1fr 1fr}}
        .stat{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between}
        .stat-label{font-size:12px;color:#6b7280;margin-bottom:4px}
        .stat-value{font-size:26px;font-weight:800}
        .stat-icon{width:44px;height:44px;border-radius:9999px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .ic-blue{background:#dbeafe}.ic-green{background:#dcfce7}.ic-yellow{background:#fef3c7}.ic-purple{background:#ede9fe}
        /* CARD */
        .card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden}
        .card-header{padding:20px 24px 16px;border-bottom:1px solid #f3f4f6}
        .card-header h2{font-size:16px;font-weight:700}
        .card-header .desc{font-size:13px;color:#9ca3af;margin-top:3px}
        .search-wrap{position:relative;margin-top:14px}
        .search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:#9ca3af;pointer-events:none}
        .search-wrap input{width:100%;padding:9px 14px 9px 36px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none}
        .search-wrap input:focus{border-color:#2563eb;box-shadow:0 0 0 3px #dbeafe}
        /* TABLE HEADER */
        .tbl-hd{display:grid;grid-template-columns:44px 1fr 110px 150px 110px 40px;gap:8px;padding:10px 16px;background:#f9fafb;border-bottom:1px solid #f3f4f6;font-size:12px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.04em}
        @media(max-width:640px){.tbl-hd{display:none}}
        /* MEMBER ROW */
        .member-row{border-bottom:1px solid #f3f4f6;transition:opacity .3s}
        .member-row:last-child{border-bottom:none}
        .row-summary{display:grid;grid-template-columns:44px 1fr 110px 150px 110px 40px;gap:8px;align-items:center;padding:12px 16px;cursor:pointer;transition:background .1s;user-select:none}
        .row-summary:hover{background:#f9fafb}
        @media(max-width:640px){.row-summary{grid-template-columns:44px 1fr auto}}
        .col-avatar{}
        .avatar{width:36px;height:36px;border-radius:9999px;background:#dbeafe;color:#1d4ed8;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .col-name{display:flex;align-items:center;gap:7px;flex-wrap:wrap;font-size:14px;font-weight:600}
        .col-sid,.col-dept,.col-joined{font-size:13px;color:#6b7280}
        @media(max-width:640px){.col-sid,.col-dept,.col-joined{display:none}}
        .badge-admin{display:inline-block;background:#fee2e2;color:#b91c1c;border-radius:9999px;font-size:11px;font-weight:700;padding:2px 8px}
        .chevron{width:16px;height:16px;transition:transform .2s;color:#9ca3af}
        /* DETAIL */
        .row-detail{background:#f9fafb;border-top:1px solid #f3f4f6;overflow:hidden}
        .detail-inner{padding:14px 20px}
        .detail-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;font-size:13px;margin-bottom:14px}
        @media(max-width:640px){.detail-grid{grid-template-columns:1fr 1fr}}
        .detail-cell label{display:block;font-size:11px;color:#9ca3af;font-weight:700;text-transform:uppercase;margin-bottom:3px}
        .detail-cell p{font-weight:600;color:#111827}
        .detail-actions{padding-top:12px;border-top:1px solid #f3f4f6}
        .btn-del-init{background:transparent;border:1px solid #fecaca;color:#dc2626;border-radius:7px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer}
        .btn-del-init:hover{background:#fef2f2}
        .confirm-row{display:flex;align-items:center;gap:10px}
        .confirm-text{font-size:13px;font-weight:600;color:#dc2626}
        .btn-del-ok{background:#dc2626;color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer}
        .btn-del-cancel{background:transparent;border:1px solid #e5e7eb;border-radius:7px;padding:6px 12px;font-size:13px;cursor:pointer}
        /* EMPTY */
        #emptyState{text-align:center;padding:40px;color:#9ca3af;font-size:14px}
        /* MODAL */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
        .modal{background:#fff;border-radius:18px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
        .modal-hd{display:flex;align-items:center;justify-content:space-between;padding:22px 24px 16px;border-bottom:1px solid #f3f4f6}
        .modal-hd h3{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
        .modal-close{background:none;border:none;cursor:pointer;font-size:22px;color:#9ca3af;line-height:1}
        .modal-close:hover{color:#374151}
        .modal-body{padding:22px 24px 24px}
        .fg{margin-bottom:17px}
        .fg label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#374151}
        .req{color:#ef4444}
        .iw{position:relative}
        .iw svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:#9ca3af}
        .iw input{width:100%;padding:9px 14px 9px 36px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none}
        .iw input:focus{border-color:#2563eb;box-shadow:0 0 0 3px #dbeafe}
        .iw-hint{font-size:11px;color:#9ca3af;margin-top:4px}
        .modal-actions{display:flex;gap:8px;margin-top:6px}
        .btn-mcancel{flex:1;padding:10px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;font-size:14px;font-weight:600;cursor:pointer}
        .btn-msubmit{flex:1;padding:10px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
        .btn-msubmit:hover{background:#1d4ed8}
        .success-state{text-align:center;padding:28px 0}
        .success-icon{width:56px;height:56px;background:#dcfce7;border-radius:9999px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
        .success-text{font-size:15px;font-weight:700;color:#15803d}
        .add-error{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:13px;color:#b91c1c;margin-bottom:12px}
        .hidden{display:none}
    </style>
</head>
<body class="min-h-screen flex flex-col">
<!-- Header -->
<header class="bg-blue-600 text-white shadow-lg">
    <div class="container mx-auto px-4">
        <div class="flex items-center justify-between h-16">
            <button onclick="location.href='/'" class="text-2xl font-bold hover:text-blue-100 transition-colors">UbiCOM</button>
            <nav class="hidden md:flex items-center gap-6">
                <a onclick="location.href='/notice'" class="hover:text-blue-100 transition-colors">공지사항</a>
                <a onclick="location.href='/calendar'" class="hover:text-blue-100 transition-colors">학사일정</a>
                <a onclick="location.href='/board'" class="hover:text-blue-100 transition-colors">게시판</a>
                <a onclick="location.href='/poll'" class="hover:text-blue-100 transition-colors">투표</a>
                <div id="nav-buttons"></div>
            </nav>
            <!-- Mobile Menu Button -->
            <button class="md:hidden p-2" id="mobile-menu-btn">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
        <!-- Mobile Navigation -->
        <nav id="mobile-menu" class="hidden md:hidden py-4 border-t border-blue-500">
            <div class="flex flex-col gap-3">
                <a onclick="location.href='/notice'" class="py-2 hover:text-blue-100 transition-colors">공지사항</a>
                <a onclick="location.href='/calendar'" class="py-2 hover:text-blue-100 transition-colors">학사일정</a>
                <a onclick="location.href='/board'" class="py-2 hover:text-blue-100 transition-colors">게시판</a>
                <a onclick="location.href='/poll'" class="py-2 hover:text-blue-100 transition-colors">투표</a>
                <div id="mobile-nav-buttons" class="flex flex-col gap-2 pt-2 border-t border-blue-500">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>
        </nav>
    </div>
</header>

<div class="page">
    <div class="page-top">
        <div>
            <h1>
                <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="#2563eb" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                동아리원 관리
            </h1>
            <p>웹사이트에 가입된 동아리원을 관리합니다</p>
        </div>
        <button class="btn-add" onclick="openModal()">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            멤버 추가
        </button>
    </div>

    <div class="stats">
        <div class="stat">
            <div><p class="stat-label">전체 동아리원</p><p class="stat-value" id="statTotal">0</p></div>
            <div class="stat-icon ic-blue"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#2563eb" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg></div>
        </div>
        <div class="stat">
            <div><p class="stat-label">회장</p><p class="stat-value" id="statAdmin">0</p></div>
            <div class="stat-icon ic-yellow"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#d97706" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg></div>
        </div>
        <div class="stat">
            <div><p class="stat-label">일반 부원</p><p class="stat-value" id="statRegular">0</p></div>
            <div class="stat-icon ic-green"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#16a34a" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></div>
        </div>
        <div class="stat">
            <div><p class="stat-label">이번 달 가입</p><p class="stat-value" id="statNew">0</p></div>
            <div class="stat-icon ic-purple"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#7c3aed" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg></div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>동아리원 목록</h2>
            <p class="desc">클릭하면 상세정보를 확인할 수 있습니다</p>
            <div class="search-wrap">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input type="text" id="searchInput" placeholder="이름, 학번, 학과로 검색" oninput="filterMembers(this.value)"/>
            </div>
        </div>
        <div class="tbl-hd">
            <div></div>
            <div>이름</div>
            <div>학번</div>
            <div>학과</div>
            <div>가입일</div>
            <div></div>
        </div>
        <div id="membersList"></div>
        <div id="emptyState" class="hidden">검색 결과가 없습니다.</div>
    </div>
</div>

<!-- ADD MODAL -->
<div id="addModal" class="modal-overlay hidden">
    <div class="modal">
        <div class="modal-hd">
            <h3>동아리원 직접 추가</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div id="addForm">
                <div class="fg">
                    <label>이름 <span class="req">*</span></label>
                    <div class="iw"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg><input type="text" id="addName" placeholder="홍길동"/></div>
                </div>
                <div class="fg">
                    <label>학번 <span class="req">*</span></label>
                    <div class="iw"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5zm0 0v6"/></svg><input type="text" id="addStudentId" placeholder="20240001" maxlength="8"/></div>
                </div>
                <div class="fg">
                    <label>학과 <span class="req">*</span></label>
                    <div class="iw"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5"/></svg><input type="text" id="addDept" placeholder="컴퓨터공학과"/></div>
                </div>
                <div class="fg">
                    <label>성별 <span class="req">*</span></label>
                    <div class="flex gap-4 mt-2">
                        <label class="flex items-center gap-2 font-normal cursor-pointer">
                            <input type="radio" name="addGender" value="m" checked class="w-4 h-4 text-blue-600"> 남성
                        </label>
                        <label class="flex items-center gap-2 font-normal cursor-pointer">
                            <input type="radio" name="addGender" value="f" class="w-4 h-4 text-blue-600"> 여성
                        </label>
                    </div>
                </div>
                <div class="fg">
                    <label>연락처 <span class="req">*</span></label>
                    <div class="iw flex items-center gap-2" id="addPhoneWrap">
                        <!-- 다른 입력란처럼 전화기 아이콘 배치 -->
                        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="absolute left-3 w-4 h-4 text-gray-400 z-10" style="top: 50%; transform: translateY(-50%); pointer-events: none;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.94.725l.548 2.2a1 1 0 01-.321.988l-1.305.98a10.582 10.582 0 004.872 4.872l.98-1.305a1 1 0 01.988-.321l2.2.548a1 1 0 01.725.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                        </svg>

                        <!-- 개별 숫자 입력 박스 (디자인 및 간격 최적화) -->
                        <input data-phone type="text" inputmode="numeric" maxlength="3" aria-label="앞자리" class="phone-box text-center" style="padding-left: 36px; width: 90px;"/>
                        <span class="phone-sep text-gray-400 font-medium">-</span>
                        <input data-phone type="text" inputmode="numeric" maxlength="4" aria-label="가운데" class="phone-box text-center" style="width: 85px; padding-left: 0; padding-right: 0;"/>
                        <span class="phone-sep text-gray-400 font-medium">-</span>
                        <input data-phone type="text" inputmode="numeric" maxlength="4" aria-label="뒷자리" class="phone-box text-center" style="width: 85px; padding-left: 0; padding-right: 0;"/>
                    </div>
                </div>
                <div class="fg">
                    <label>초기 비밀번호 <span class="req">*</span></label>
                    <div class="iw"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg><input type="password" id="addPw" placeholder="최소 6자"/></div>
                    <p class="iw-hint">추가된 멤버는 이 비밀번호로 로그인할 수 있습니다.</p>
                </div>
                <div id="addError" class="add-error hidden"></div>
                <div class="modal-actions">
                    <button class="btn-mcancel" onclick="closeModal()">취소</button>
                    <button class="btn-msubmit" onclick="addMember()">추가하기</button>
                </div>
            </div>
            <div id="addSuccess" class="success-state hidden">
                <div class="success-icon"><svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="#16a34a" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
                <p class="success-text">추가 완료!</p>
            </div>
        </div>
    </div>
</div>

<script>
    (function seed() {
        if (!localStorage.getItem("currentUser"))
            localStorage.setItem("currentUser", JSON.stringify({id:"u1",name:"관리자",username:"관리자",isAdmin:true}));
    })();
</script>
<script src="js/admin-members.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
</body>
</html>
