<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지사항 상세 - UbiCOM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen flex flex-col bg-gray-50">
<!-- Header -->
<header class="bg-blue-600 text-white shadow-lg">
    <div class="container mx-auto px-4">
        <div class="flex items-center justify-between h-16">
            <button onclick="location.href='/'" class="text-2xl font-bold hover:text-blue-100 transition-colors">UbiCOM</button>
            <nav class="hidden md:flex items-center gap-6">
                <a onclick="location.href='/notice'" class="hover:text-blue-100 transition-colors font-semibold">공지사항</a>
                <a onclick="location.href='/calendar'" class="hover:text-blue-100 transition-colors">학사일정</a>
                <a onclick="location.href='/board'" class="hover:text-blue-100 transition-colors">게시판</a>
                <a onclick="location.href='/vote'" class="hover:text-blue-100 transition-colors">투표</a>
                <div id="nav-buttons"></div>
            </nav>
        </div>
    </div>
</header>

<!-- Main Content -->
<main class="flex-1 py-8 px-4">
    <div class="container mx-auto max-w-4xl">
        <div class="flex justify-between items-center mb-6">
            <button onclick="location.href='/notice'" class="text-blue-600 hover:text-blue-800 font-medium flex items-center gap-1">
                ← 공지사항 목록으로 돌아가기
            </button>
            <!-- 🗑️ 관리자 전용 공지 삭제 버튼 영역 -->
            <div id="notice-actions"></div>
        </div>

        <!-- 공지사항 상세 카드 -->
        <div class="bg-white rounded-lg shadow-md p-8 mb-6">
            <div class="border-b pb-4 mb-6">
                <div class="flex items-center gap-2 mb-2">
                    <span class="bg-blue-100 text-blue-800 text-xs px-2.5 py-1 rounded-full font-semibold">공지</span>
                    <h1 id="notice-title" class="text-3xl font-bold text-gray-900">공지사항 제목</h1>
                </div>
                <div class="flex flex-wrap items-center gap-4 text-sm text-gray-500 mt-3">
                    <span id="notice-author">작성자: -</span>
                    <span>·</span>
                    <span id="notice-date">작성일: -</span>
                    <span>·</span>
                    <span id="notice-views">조회수: 0</span>
                </div>
            </div>

            <!-- 공지 본문 내용 -->
            <div id="notice-content" class="text-gray-800 whitespace-pre-wrap leading-relaxed text-base min-h-[150px] mb-8">
                내용 불러오는 중...
            </div>

            <!-- 📊 첨부된 투표 표시 영역 -->
            <div id="notice-poll-section"></div>
        </div>
    </div>
</main>

<!-- 🗑️ 커스텀 삭제 확인 모달 -->
<div id="delete-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-lg max-w-sm w-full p-6 shadow-xl text-center">
        <div class="w-12 h-12 rounded-full bg-red-100 text-red-600 mx-auto flex items-center justify-center mb-4">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
            </svg>
        </div>
        <h3 class="text-lg font-bold text-gray-900 mb-2">공지사항 삭제</h3>
        <p class="text-sm text-gray-600 mb-6">정말로 이 공지사항을 삭제하시겠습니까?<br><span class="text-xs text-red-500">(첨부된 투표도 함께 삭제됩니다)</span></p>
        <div class="flex justify-center gap-3">
            <button onclick="closeDeleteModal()" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-md text-sm font-medium transition-colors">
                취소
            </button>
            <button id="confirm-delete-btn" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-md text-sm font-medium transition-colors">
                삭제하기
            </button>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script src="js/notice-detail.js"></script>
</body>
</html>
