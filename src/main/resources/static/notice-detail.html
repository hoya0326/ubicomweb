<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지사항 상세 - UbiCOM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        /* 📊 poll.html 스타일 100% 동일 이식 */
        .badge { display: inline-block; border-radius: 9999px; font-size: 11px; font-weight: 700; padding: 2px 9px; }
        .badge-blue { background: #dbeafe; color: #1d4ed8; }
        .badge-green { background: #dcfce7; color: #15803d; }
        .badge-gray { background: #f3f4f6; color: #6b7280; }

        .poll-card-inner { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; overflow: hidden; margin-top: 24px; }
        .poll-body { border-top: 1px solid #f3f4f6; padding: 20px; }
        .poll-question { font-size: 15px; font-weight: 600; color: #111827; margin-bottom: 16px; }

        /* VOTE OPTIONS */
        .opts-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
        .opt-label { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border: 1px solid #e5e7eb; border-radius: 10px; cursor: pointer; transition: all .15s; background: #fff; }
        .opt-label:hover { background: #f9fafb; }
        .opt-selected { border-color: #3b82f6 !important; background: #eff6ff !important; color: #1d4ed8; font-weight: 600; }
        .opt-input { width: 16px; height: 16px; flex-shrink: 0; accent-color: #2563eb; }
        .opt-text { font-size: 14px; }

        /* ACTIONS & BUTTONS */
        .vote-actions { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
        .btn-vote { background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 8px 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s; }
        .btn-vote:hover { background: #1d4ed8; }
        .btn-see-result { background: none; border: none; font-size: 13px; color: #6b7280; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
        .btn-go-vote { background: none; border: none; font-size: 13px; color: #2563eb; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; margin-top: 8px; }
        .vote-hint { font-size: 13px; color: #9ca3af; padding: 8px 0; }
        .vote-error { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 8px 12px; font-size: 13px; color: #b91c1c; margin-bottom: 10px; }

        /* RESULT */
        .result-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 8px; }
        .result-item { display: flex; flex-direction: column; gap: 4px; }
        .result-label { display: flex; justify-content: space-between; font-size: 13px; }
        .result-mine { color: #2563eb; font-weight: 600; }
        .result-count { color: #6b7280; }
        .bar-bg { width: 100%; background: #f3f4f6; border-radius: 9999px; height: 10px; overflow: hidden; }
        .bar-fill { height: 10px; border-radius: 9999px; transition: width .4s ease; }
        .bar-blue { background: #3b82f6; }
        .bar-gray { background: #9ca3af; }
        .voter-names { font-size: 11px; color: #9ca3af; }
        .text-red { color: #ef4444; }
        .text-orange { color: #f97316; }

        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-gray-50">
<!-- Header -->
<header class="bg-blue-600 text-white shadow-lg w-full">
    <!-- container 대신 w-full과 px-6(좌우 여백) 사용 -->
    <div class="w-full px-6 flex items-center justify-between h-16">
            <button onclick="location.href='/'" class="text-2xl font-bold hover:text-blue-100 transition-colors">UbiCOM</button>
            <nav class="hidden md:flex items-center gap-6">
                <a onclick="location.href='/notice'" class="hover:text-blue-100 transition-colors font-semibold cursor-pointer">공지사항</a>
                <a onclick="location.href='/calendar'" class="hover:text-blue-100 transition-colors cursor-pointer">학사일정</a>
                <a onclick="location.href='/board'" class="hover:text-blue-100 transition-colors cursor-pointer">게시판</a>
                <a onclick="location.href='/vote'" class="hover:text-blue-100 transition-colors cursor-pointer">투표</a>
                <div id="nav-buttons"></div>
            </nav>
        </div>
    </div>
</header>

<!-- Main Content -->
<main class="flex-1 py-8 px-4">
    <div class="container mx-auto max-w-4xl">
        <div class="flex justify-between items-center mb-6">
            <button onclick="location.href='/notice'" class="text-blue-600 hover:text-blue-800 font-medium flex items-center gap-1">
                ← 공지사항 목록으로 돌아가기
            </button>
            <div id="notice-actions"></div>
        </div>

        <!-- 공지사항 상세 카드 -->
        <div class="bg-white rounded-2xl border border-gray-200 p-8 mb-6 shadow-sm">
            <div class="border-b border-gray-100 pb-5 mb-6">
                <div class="flex items-center gap-2 mb-2">
                    <span class="bg-blue-100 text-blue-800 text-xs px-2.5 py-1 rounded-full font-semibold">공지</span>
                    <h1 id="notice-title" class="text-2xl md:text-3xl font-bold text-gray-900">공지사항 제목</h1>
                </div>
                <div class="flex flex-wrap items-center gap-3 text-xs text-gray-500 mt-3">
                    <span id="notice-author">작성자: -</span>
                    <span>·</span>
                    <span id="notice-date">작성일: -</span>
                    <span>·</span>
                    <span id="notice-views">조회수: 0</span>
                </div>
            </div>

            <!-- 공지 본문 내용 -->
            <div id="notice-content" class="text-gray-800 whitespace-pre-wrap leading-relaxed min-h-[120px] text-base">
                내용을 불러오는 중...
            </div>

            <!-- 📊 poll.html/poll.js 기반 동일 구조 투표 영역 -->
            <div id="notice-poll-section"></div>
        </div>
    </div>
</main>

<!-- 삭제 확인 모달 -->
<div id="delete-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-xl text-center">
        <div class="w-12 h-12 rounded-full bg-red-100 text-red-600 mx-auto flex items-center justify-center mb-4">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
            </svg>
        </div>
        <h3 class="text-lg font-bold text-gray-900 mb-1">공지사항 삭제</h3>
        <p class="text-xs text-gray-500 mb-6">정말로 이 공지사항을 삭제할까요?<br><span class="text-red-500">(첨부된 투표도 함께 삭제됩니다)</span></p>
        <div class="flex justify-center gap-2">
            <button onclick="closeDeleteModal()" class="px-4 py-2 border border-gray-200 rounded-lg text-xs font-semibold text-gray-700 bg-white">취소</button>
            <button id="confirm-delete-btn" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-xs font-semibold">삭제하기</button>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script src="js/notice-detail.js"></script>
</body>
</html>
